<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mk-brain explorer — 4000+ AI 書籤知識庫</title>
<meta name="description" content="Maki 的個人 AI 知識庫。4000+ 篇書籤，AI 策展，signal score 排序。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141418;--border:#2a2a30;--text:#e4e4e7;--muted:#71717a;--accent:#6366f1;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans TC',system-ui,sans-serif;line-height:1.6}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:60px 20px 40px}
header h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:1.1rem;margin-top:12px}
.stats{display:flex;gap:24px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 24px;text-align:center}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--accent)}
.stat .label{font-size:0.85rem;color:var(--muted)}
.controls{display:flex;gap:12px;margin:30px 0;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;outline:none}
.search:focus{border-color:var(--accent)}
.filter-btn{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:0.85rem;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.card-domain{font-size:0.8rem;color:var(--muted);white-space:nowrap}
.signal-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.8rem;font-weight:700;white-space:nowrap}
.signal-high{background:rgba(34,197,94,.15);color:var(--green)}
.signal-mid{background:rgba(245,158,11,.15);color:var(--amber)}
.signal-top{background:rgba(99,102,241,.15);color:var(--accent)}
.card-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-title a{color:var(--text)}
.card-title a:hover{color:var(--accent);text-decoration:none}
.card-insight{font-size:0.9rem;color:var(--muted);flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.route-tag{font-size:0.75rem;padding:2px 8px;border-radius:6px;background:var(--border);color:var(--muted)}
.card-date{font-size:0.75rem;color:var(--muted)}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:1.1rem}
footer{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem}
footer a{color:var(--accent)}
#count{color:var(--muted);font-size:0.9rem;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>mk-brain explorer</h1>
  <p>Maki 的個人 AI 知識庫 — 4000+ 篇書籤，AI 策展，signal score 排序</p>
  <div class="stats">
    <div class="stat"><div class="num" id="total-count">—</div><div class="label">書籤</div></div>
    <div class="stat"><div class="num" id="domain-count">—</div><div class="label">來源網域</div></div>
    <div class="stat"><div class="num" id="avg-signal">—</div><div class="label">平均 Signal</div></div>
  </div>
</header>
<div class="container">
  <div class="controls">
    <input class="search" id="search" placeholder="搜尋書籤：關鍵字、domain、insight..." autocomplete="off">
    <button class="filter-btn active" data-route="all">All</button>
    <button class="filter-btn" data-route="research">Research</button>
    <button class="filter-btn" data-route="writer">Writer</button>
    <button class="filter-btn" data-route="validator">Validator</button>
    <button class="filter-btn" data-route="archive">Archive</button>
    <span id="count"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>沒有符合條件的書籤</div>
</div>
<footer>
  <p>Powered by <a href="https://github.com/MakiDevelop/mk-brain">mk-brain</a> — AI-curated knowledge base</p>
  <p style="margin-top:8px"><a href="https://blog.chibakuma.com">blog.chibakuma.com</a></p>
</footer>
<script>
let DATA = [];
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const empty = document.getElementById('empty');
const countEl = document.getElementById('count');
let activeRoute = 'all';

function signalClass(s) {
  if (s >= 80) return 'signal-top';
  if (s >= 60) return 'signal-high';
  return 'signal-mid';
}

function formatDate(d) {
  if (!d) return '';
  return d.slice(0, 10);
}

function renderCard(b) {
  const title = b.title || b.url.split('/').pop() || b.url;
  return `<div class="card">
    <div class="card-header">
      <span class="card-domain">${b.domain || ''}</span>
      <span class="signal-badge ${signalClass(b.signal)}">⚡ ${b.signal}</span>
    </div>
    <div class="card-title"><a href="${b.url}" target="_blank" rel="noopener">${title}</a></div>
    <div class="card-insight">${b.insight || ''}</div>
    <div class="card-footer">
      <span class="route-tag">${b.route || '—'}</span>
      <span class="card-date">${formatDate(b.date)}</span>
    </div>
  </div>`;
}

function render() {
  const q = search.value.toLowerCase().trim();
  const filtered = DATA.filter(b => {
    if (activeRoute !== 'all' && b.route !== activeRoute) return false;
    if (!q) return true;
    return (b.title + ' ' + b.insight + ' ' + b.domain + ' ' + b.url).toLowerCase().includes(q);
  });
  grid.innerHTML = filtered.slice(0, 200).map(renderCard).join('');
  empty.hidden = filtered.length > 0;
  countEl.textContent = filtered.length + ' 筆';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.filter-btn.active').classList.remove('active');
    btn.classList.add('active');
    activeRoute = btn.dataset.route;
    render();
  });
});

search.addEventListener('input', render);

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    document.getElementById('total-count').textContent = data.length;
    const domains = new Set(data.map(b => b.domain).filter(Boolean));
    document.getElementById('domain-count').textContent = domains.size;
    const avg = Math.round(data.reduce((s, b) => s + (b.signal || 0), 0) / data.length);
    document.getElementById('avg-signal').textContent = avg;
    render();
  });
</script>
</body>
</html>
